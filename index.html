<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rally Académico 2025</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;min-height:100vh;background:#0f1117;color:#e8eaf0;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#0f1117;}
::-webkit-scrollbar-thumb{background:#2d3148;border-radius:3px;}
tr:hover td{background:#1a1d2e44;}
button:hover{filter:brightness(1.15);}
select option{background:#1a1d2e;}
input[type=number]::-webkit-inner-spin-button{opacity:0.3;}
input[type=time]{color-scheme:dark;}
.layout{display:flex;min-height:100vh;}
.sidebar{width:210px;min-height:100vh;background:#0b0d14;border-right:1px solid #1e2130;display:flex;flex-direction:column;padding:20px 10px;position:sticky;top:0;height:100vh;overflow:hidden;gap:4px;}
/* ... (Resto de estilos se mantienen igual) ... */
</style>
</head>
<body>

<div class="layout">
  <nav class="sidebar">
    <div style="padding:10px 15px;margin-bottom:20px">
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;letter-spacing:-0.5px;color:#fff">RALLY<span style="color:#60a5fa">2025</span></div>
      <div style="font-size:10px;color:#4b5563;text-transform:uppercase;letter-spacing:1px;margin-top:4px">Panel de Control</div>
    </div>
    </nav>

  <main class="main-content">
    </main>
</div>

<script>
// URL configurada para buscar en la misma carpeta del sitio en GitHub
const GITHUB_DATA_URL = 'datos.csv'; 

let db = {
  equipos: JSON.parse(localStorage.getItem('rally_equipos') || '[]'),
  resultados: JSON.parse(localStorage.getItem('rally_resultados') || '[]'),
  auditoria: JSON.parse(localStorage.getItem('rally_auditoria') || '[]')
};

function saveEquipos(){ localStorage.setItem('rally_equipos', JSON.stringify(db.equipos)); }
function saveResultados(){ localStorage.setItem('rally_resultados', JSON.stringify(db.resultados)); }
function saveAuditoria(){ localStorage.setItem('rally_auditoria', JSON.stringify(db.auditoria)); }

// NUEVA FUNCIÓN: Carga de datos desde GitHub
async function fetchGitHubData() {
  try {
    const response = await fetch(GITHUB_DATA_URL);
    if (!response.ok) throw new Error('No se pudo encontrar el archivo datos.csv');
    
    const csvText = await response.text();
    const rows = csvText.split('\n').map(row => row.trim()).filter(row => row.length > 0);
    
    // Solo cargamos si la base de datos de equipos está vacía para no duplicar
    if (db.equipos.length === 0 && rows.length > 0) {
      // Asumiendo que el CSV no tiene encabezado o el encabezado es: nombre,categoria
      rows.forEach((row, index) => {
        const columns = row.split(',');
        if (columns.length >= 2) {
          db.equipos.push({
            id: Date.now() + index,
            nombre: columns[0].trim(),
            categoria: columns[1].trim()
          });
        }
      });
      saveEquipos();
      addLog('Sistema', 'Carga automática de datos desde GitHub');
      renderAll();
    }
  } catch (error) {
    console.error('Error al cargar datos externos:', error);
  }
}

function addLog(usuario, accion){
  db.auditoria.push({ ts: Date.now(), usuario, accion });
  saveAuditoria();
  renderAuditoria();
}

function renderAll(){
  renderEquipos();
  renderResultados();
  renderDashboard();
  renderAuditoria();
}

// Inicialización
window.onload = () => {
  fetchGitHubData(); // Intentar cargar datos de GitHub al iniciar
  renderAll();
};

// ... (El resto de tus funciones de renderizado, PDF y lógica interna se mantienen igual) ...

</script>
</body>
</html>
